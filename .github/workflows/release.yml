---
name: Publish on Ansible Galaxy

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish:
    name: Publish on Ansible Galaxy
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Release Ansible Role to Galaxy
        uses: hspaans/ansible-galaxy-action@v2.1.0
        with:
          api_key: ${{ secrets.GALAXY_API_KEY }}
