---
name: Test Ansible Role

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    tags:
      - "v*"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: "lipaysamart.tailscale"

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Lint code.
        run: |
          yamllint .

  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu-latest
          - ubuntu-22.04
          - ubuntu-24.04
          - debian12
          - debian13

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v4
        with:
          path: "lipaysamart.tailscale"

      - name: Set up Python 3.
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies.
        run: pip3 install ansible pyyaml

      - name: Run syntax check.
        run: |
          ansible-playbook lipaysamart.tailscale/tasks/main.yml --syntax-check
